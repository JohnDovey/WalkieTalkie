<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WalkieTalkie — Old Nodes</title>
  <link rel="stylesheet" href="/static/vendor/bootstrap.min.css">
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">WalkieTalkie</a>
      <div class="navbar-nav">
        <a class="nav-link" href="/">Devices</a>
        <a class="nav-link" href="/map">Map</a>
        <a class="nav-link active" href="/old-nodes">Old Nodes</a>
        <a class="nav-link" href="/stats">Stats</a>
        <a class="nav-link" href="/settings">Settings</a>
        <a class="nav-link" href="/about">About</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <h1 class="h4 mb-3">Old Nodes</h1>
    <p class="text-muted">Devices not seen in over 2 hours. A device moves back to the main Devices page automatically as soon as it's seen again.</p>
    <table class="table table-striped align-middle">
      <thead>
        <tr>
          <th>Name</th>
          <th>Platform</th>
          <th>Status</th>
          <th>Last Seen</th>
          <th>GPS</th>
          <th>Discovery</th>
          <th>App Version</th>
        </tr>
      </thead>
      <tbody id="device-rows">
        <tr><td colspan="7" class="text-muted">Loading&hellip;</td></tr>
      </tbody>
    </table>
  </div>

  <script src="/static/vendor/jquery.min.js"></script>
  <script src="/static/vendor/bootstrap.bundle.min.js"></script>
  <script src="/static/app.js"></script>
  <script>
    function render(devices) {
      var old = sortByLastSeenDesc((devices || []).filter(isOldNode));
      if (!old.length) {
        $('#device-rows').html('<tr><td colspan="7" class="text-muted">No old nodes.</td></tr>');
        return;
      }
      var rows = old.map(function (d) {
        return '<tr>' +
          '<td>' + deviceNameHTML(d) + '</td>' +
          '<td>' + (d.platform || '—') + '</td>' +
          '<td>' + statusBadge(d.status) + '</td>' +
          '<td>' + relativeTime(d.lastSeen) + '</td>' +
          '<td>' + gpsText(d) + '</td>' +
          '<td>' + discoveryBadge(d) + '</td>' +
          '<td>' + (d.appVersion || '—') + '</td>' +
          '</tr>';
      });
      $('#device-rows').html(rows.join(''));
    }

    function poll() {
      $.getJSON('/api/devices', render).fail(function () {
        $('#device-rows').html('<tr><td colspan="7" class="text-danger">Failed to load devices.</td></tr>');
      });
    }

    poll();
    setInterval(poll, 3000);
  </script>
</body>
</html>
