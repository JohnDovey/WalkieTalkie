<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WalkieTalkie — Map</title>
  <link rel="stylesheet" href="/static/vendor/bootstrap.min.css">
  <link rel="stylesheet" href="/static/vendor/leaflet.css">
  <style>
    #map { height: calc(100vh - 120px); width: 100%; }
    .wt-marker {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,.35);
    }
    .wt-marker-device { background: #0d6efd; }
    .wt-marker-base { background: #dc3545; }
    .wt-marker-disconnected { background: #6c757d; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark bg-dark mb-3">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">WalkieTalkie</a>
      <div class="navbar-nav">
        <a class="nav-link" href="/">Devices</a>
        <a class="nav-link active" href="/map">Map</a>
        <a class="nav-link" href="/old-nodes">Old Nodes</a>
        <a class="nav-link" href="/stats">Stats</a>
        <a class="nav-link" href="/settings">Settings</a>
        <a class="nav-link" href="/about">About</a>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <p class="text-muted small mb-2">
      Map tiles load from OpenStreetMap and need internet access — everything else in this app works fully offline.
      Devices with no GPS fix at all aren't shown.
      <span class="ms-2"><span class="wt-marker wt-marker-device d-inline-block align-middle"></span> device</span>
      <span class="ms-2"><span class="wt-marker wt-marker-base d-inline-block align-middle"></span> Base Station</span>
      <span class="ms-2"><span class="wt-marker wt-marker-disconnected d-inline-block align-middle"></span> disconnected</span>
    </p>
    <div id="map"></div>
  </div>

  <script src="/static/vendor/jquery.min.js"></script>
  <script src="/static/vendor/leaflet.js"></script>
  <script>
    var map = L.map('map').setView([0, 0], 2);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    var markers = {};

    function pointFor(d) {
      return d.currentLocation || d.lastKnownLocation || null;
    }

    function isBaseStation(d) {
      if ((d.name || '').indexOf('Base Station:') === 0) return true;
      if ((d.platform || '').indexOf('desktop-') === 0) return true;
      return (d.capabilities || []).indexOf('api') !== -1;
    }

    function markerClass(d) {
      if (d.status !== 'connected') return 'wt-marker wt-marker-disconnected';
      if (isBaseStation(d)) return 'wt-marker wt-marker-base';
      return 'wt-marker wt-marker-device';
    }

    function makeIcon(d) {
      return L.divIcon({
        className: '',
        html: '<div class="' + markerClass(d) + '"></div>',
        iconSize: [14, 14],
        iconAnchor: [7, 7],
        popupAnchor: [0, -8]
      });
    }

    function popupText(d, p) {
      var label = d.currentLocation ? 'current' : 'last known';
      return '<strong>' + d.name + '</strong><br>' + (d.platform || '') + '<br>' +
        d.status + ' (' + label + ')<br>' +
        p.lat.toFixed(5) + ', ' + p.lon.toFixed(5);
    }

    // Base Station GPS is the mean of connected peers, so a single phone and
    // its Base Station often share identical coordinates and stack as one pin.
    // Fan out near-duplicates so every node stays visible/clickable.
    function fanOut(items) {
      var groups = {};
      var keyOf = function (lat, lon) {
        return lat.toFixed(5) + ',' + lon.toFixed(5);
      };
      items.forEach(function (it) {
        var k = keyOf(it.lat, it.lon);
        (groups[k] || (groups[k] = [])).push(it);
      });
      Object.keys(groups).forEach(function (k) {
        var g = groups[k];
        if (g.length < 2) return;
        var radius = 0.00012; // ~13m — enough to separate pins at street zoom
        g.forEach(function (it, i) {
          var angle = (2 * Math.PI * i) / g.length - Math.PI / 2;
          it.lat = it.lat + radius * Math.cos(angle);
          it.lon = it.lon + radius * Math.sin(angle);
        });
      });
      return items;
    }

    function render(devices) {
      var seen = {};
      var bounds = [];
      var items = [];
      (devices || []).forEach(function (d) {
        var p = pointFor(d);
        if (!p || typeof p.lat !== 'number' || typeof p.lon !== 'number') return;
        items.push({ d: d, lat: p.lat, lon: p.lon, p: p });
      });
      // Draw devices first, Base Stations last (still fanned), so peer pins
      // aren't buried under the red Base Station marker when fan-out fails.
      items.sort(function (a, b) {
        return (isBaseStation(a.d) ? 1 : 0) - (isBaseStation(b.d) ? 1 : 0);
      });
      fanOut(items);

      items.forEach(function (it) {
        var d = it.d;
        seen[d.id] = true;
        bounds.push([it.lat, it.lon]);
        if (markers[d.id]) {
          markers[d.id].setLatLng([it.lat, it.lon])
            .setIcon(makeIcon(d))
            .setPopupContent(popupText(d, it.p));
        } else {
          markers[d.id] = L.marker([it.lat, it.lon], { icon: makeIcon(d), riseOnHover: true })
            .addTo(map)
            .bindPopup(popupText(d, it.p));
        }
      });
      Object.keys(markers).forEach(function (id) {
        if (!seen[id]) {
          map.removeLayer(markers[id]);
          delete markers[id];
        }
      });
      if (bounds.length && !render.fitted) {
        map.fitBounds(bounds, { maxZoom: 14, padding: [20, 20] });
        render.fitted = true;
      }
    }

    function poll() {
      $.getJSON('/api/devices', render);
    }

    poll();
    setInterval(poll, 5000);
  </script>
</body>
</html>
