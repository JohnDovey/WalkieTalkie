<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>MeshSniff</title>
  <link rel="stylesheet" href="/static/vendor/vis-network.min.css"/>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a222c;
      --text: #e7ecf1;
      --muted: #8b9aab;
      --accent: #3d9bfd;
      --border: #2a3542;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column;
    }
    header {
      display: flex; align-items: center; gap: 1rem; padding: 0.6rem 1rem;
      background: linear-gradient(90deg, #122033, #1a222c 40%, #0f1419);
      border-bottom: 1px solid var(--border);
    }
    header h1 { margin: 0; font-size: 1.1rem; letter-spacing: 0.04em; font-weight: 600; }
    #status { font-size: 0.8rem; color: var(--muted); flex: 1; }
    #net { flex: 1; min-height: 0; background: radial-gradient(ellipse at center, #16202c 0%, #0f1419 70%); }
    .modal-backdrop {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      align-items: center; justify-content: center; z-index: 20;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
      width: min(520px, 92vw); max-height: 80vh; overflow: auto; padding: 1rem 1.2rem;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    }
    .modal h2 { margin: 0 0 0.5rem; font-size: 1.15rem; }
    .modal .kind { color: var(--accent); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .modal dl { display: grid; grid-template-columns: 8.5rem 1fr; gap: 0.35rem 0.75rem; margin: 0.8rem 0; font-size: 0.9rem; }
    .modal dt { color: var(--muted); }
    .modal dd { margin: 0; word-break: break-word; }
    .modal dd a { color: var(--accent); text-decoration: none; }
    .modal dd a:hover { text-decoration: underline; }
    .modal dl.nested {
      display: grid; grid-template-columns: 7rem 1fr; gap: 0.25rem 0.5rem;
      margin: 0; padding: 0.35rem 0.5rem; background: #141b24; border-radius: 4px;
      border: 1px solid var(--border); font-size: 0.85rem;
    }
    .modal button {
      background: var(--accent); color: #041018; border: 0; border-radius: 4px;
      padding: 0.4rem 0.9rem; font-weight: 600; cursor: pointer;
    }
    .pill { display: inline-block; padding: 0.1rem 0.45rem; border-radius: 999px; background: #243041; font-size: 0.72rem; margin: 0.1rem; }
  </style>
</head>
<body>
  <header>
    <h1>MeshSniff</h1>
    <div id="status">Starting…</div>
  </header>
  <div id="net"></div>
  <div class="modal-backdrop" id="backdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="kind" id="m-kind"></div>
      <h2 id="m-title"></h2>
      <dl id="m-body"></dl>
      <button type="button" id="m-close">Close</button>
    </div>
  </div>
  <script src="/static/vendor/vis-network.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
